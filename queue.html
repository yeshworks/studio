<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
    
    <style>
      body { 
        font-family: 'Lilita One', sans-serif; 
        background-color: #DEF4F0; 
        background-image: url('bg-pattern.png');
        background-repeat: repeat;
        background-size: 20vh;
        color: #3f4f3f; 
        text-align: center; 
        padding: 20px; 
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }

      .card { 
        position: relative; /* Needed for the X positioning */
        background: white; 
        width: 90%;
        max-width: 400px; 
        padding: 30px; 
        border: 3px dashed #B2E8E3; 
        border-radius: 25px; 
        box-shadow: 0 0 0 10px white;
      }

      /* The X Button */
      .close-btn {
        position: absolute;
        top: 15px;
        right: 20px;
        text-decoration: none;
        color: #46A490;
        font-size: 24px;
        font-weight: bold;
        transition: 0.2s;
      }
      .close-btn:hover { transform: scale(1.2); }

      h1 { color: #2b3a2b; font-size: 28px; margin-bottom: 20px; }
      p { color: #3f4f3f; }
      
      input { 
        padding: 12px; 
        width: 85%; 
        border-radius: 15px; 
        border: 2px solid #B2E8E3; 
        margin-bottom: 15px; 
        font-family: 'Lilita One', sans-serif;
        color: #42AE98;
        outline: none;
        box-sizing: border-box;
      }
      .txt{
          color: #46A490;
      }
      .txt2 {
          color: #42AE98;
      }
      button { 
        background: #B9E8AB; 
        color: #549141; 
        border: none; 
        padding: 12px 30px; 
        border-radius: 15px; 
        cursor: pointer; 
        font-weight: bold; 
        font-family: 'Lilita One', sans-serif;
        transition: 0.2s;
        font-size: 16px;
      }

      button:hover { background: #a4d496; transform: translateY(-2px); }

      #result { margin-top: 20px; display: none; }
      
      .status-box { 
        background: #B9E8AB; 
        color: #549141; 
        padding: 15px; 
        border-radius: 15px; 
        font-size: 1.2em; 
        font-weight: bold; 
        margin: 15px 0; 
      }
      
      #clientName { color: #549141; }
      #error { color: #DD5D43; display: none; margin-top: 15px; }
    </style>
  </head>
  <body>

    <div class="card">
      <a href="index.html" class="close-btn">&times;</a>

      <h1 class="txt">☘︎ YeshDesk Tracker</h1>
      <p class="txt2">Enter your email to check your status:</p>
      <input type="email" id="emailInput" placeholder="your@email.com">
      <br>
      <button onclick="checkStatus()">Check Status</button>

      <div id="result">
        <p>Hi <span id="clientName"></span>! ✨</p>
        <p>Your <b><span id="commType"></span></b> is:</p>
        <div id="commStatus" class="status-box"></div>
        <p style="font-size: 0.9em;">Deadline: <span id="commDeadline"></span></p>
      </div>
      
      <p id="error">Email not found in queue! :(</p>
    </div>

      function showResult(data) {
        if (data.found) {
          document.getElementById('error').style.display = 'none';
          document.getElementById('result').style.display = 'block';
          document.getElementById('clientName').innerText = data.name;
          document.getElementById('commType').innerText = data.type;
          document.getElementById('commStatus').innerText = data.status;
          document.getElementById('commDeadline').innerText = data.deadline || "TBA";
        } else {
          document.getElementById('result').style.display = 'none';
          document.getElementById('error').style.display = 'block';
        }
      }
