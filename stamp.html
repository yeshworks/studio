<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Loyalty Card</title>
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Lilita One', sans-serif; 
            background-color: #DEF4F0; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        /* Update the stamp icon size and add a "shine" pulse animation */
.stamp-icon { 
    font-size: 24px; /* Make it bigger so it's visible */
    animation: shinePulse 2s infinite;
}

@keyframes shinePulse {
    0% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.2); opacity: 0.8; }
    100% { transform: scale(1); opacity: 1; }
}

.reward { 
    border-color: #C9A86A; 
    background: #FFF6E5; 
}


        /* 🌀 3D CONTAINER WITH FLOAT ANIMATION */
        .float-container {
            perspective: 1000px;
            width: 350px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .flipper {
            position: relative;
            width: 100%;
            height: 200px;
            transform-style: preserve-3d;
            /* Vertical fast flip every 6 seconds */
            animation: flipVertical 6s infinite ease-in-out;
        }

        @keyframes flipVertical {
            0%, 40% { transform: rotateX(0deg); }
            50%, 90% { transform: rotateX(180deg); }
            100% { transform: rotateX(0deg); }
        }

        /* 🌿 CARD SIDES */
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border: 3px dashed #B2E8E3;
            border-radius: 25px;
            background: white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .card-back {
            background: #fdfdfd; /* Blank back */
            transform: rotateX(180deg);
        }

        /* 🌿 CARD CONTENT */
        .loyalty-card-wrapper { padding: 30px; text-align: center; }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            text-decoration: none;
            color: #549141;
            font-size: 24px;
            font-weight: bold;
        }

        .loyalty-header h2 { color: #2b3a2b; font-size: 1.3rem; margin: 0; }
        .stamps-grid { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 10px; 
            padding: 15px 0;
        }
        .stamp-slot { 
            aspect-ratio: 1 / 1; 
            border: 2px dashed #B2E8E3; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
    </style>
</head>
<body>

    <div class="float-container">
        <div class="flipper">
            <div class="card-front">
                <div class="loyalty-card-wrapper">
                    <a href="index.html" class="close-btn">&times;</a>
                    <div class="loyalty-header">
                        <h2>Sprout Studio Loyalty ☘︎</h2>
                    </div>
                    <div class="stamps-grid">
                        <div class="stamp-slot">🌿</div>
                        <div class="stamp-slot">🌿</div>
                        <div class="stamp-slot"></div>
                        <div class="stamp-slot"></div>
                        <div class="stamp-slot" style="background:#FFF6E5; border-color:#C9A86A;">⭐</div>
                    </div>
                </div>
            </div>

            <div class="card-back"></div>
        </div>
    </div>

</body>
</html>
